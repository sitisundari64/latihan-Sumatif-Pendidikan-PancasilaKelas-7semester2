  {stimulus:"🌺 Gambar: Anak-anak bermain permainan tradisional seperti congklak dan egrang bersama-sama.",soal:"Melestarikan permainan tradisional bermanfaat untuk... (Pilih 2 atau lebih jawaban benar)",opsi:["a. Menjaga warisan budaya lokal","b. Membangun kerjasama dan sportivitas anak","c. Menggantikan teknologi sepenuhnya","d. Menolak globalisasi budaya"],jwb:["a","b"]},
  {stimulus:"📖 Teks: Setiap individu memiliki peran dalam menjaga persatuan dan kesatuan bangsa Indonesia.",soal:"Tindakan yang dapat dilakukan pelajar untuk menjaga persatuan bangsa adalah... (Pilih 2 atau lebih jawaban benar)",opsi:["a. Tidak membeda-bedakan teman berdasarkan suku atau agama","b. Menggunakan bahasa Indonesia yang baik dalam pergaulan","c. Hanya berteman dengan yang sepemikiran","d. Menyebarkan informasi yang memecah belah"],jwb:["a","b"]},
  {stimulus:"🤝 Gambar: Relawan dari berbagai daerah membantu korban bencana alam bersama-sama.",soal:"Kegiatan sukarela membantu korban bencana mencerminkan nilai... (Pilih 2 atau lebih jawaban benar)",opsi:["a. Gotong royong lintas daerah","b. Kepedulian sosial tanpa pamrih","c. Kewajiban yang harus dipaksa","d. Kemanusiaan yang adil dan beradab (sila ke-2 Pancasila)"],jwb:["a","b","d"]}
];

const SOAL_URAIAN = [
  {stimulus:"🏞️ Gambar: Peta Indonesia dengan ikon-ikon yang menggambarkan keberagaman budaya dari Sabang sampai Merauke.",soal:"Jelaskan mengapa keberagaman budaya di Indonesia harus dijaga dan dilestarikan! Berikan minimal 3 alasan yang kuat."},
  {stimulus:"📖 Teks: 'Alam terkembang jadi guru' adalah pepatah Minangkabau yang bermakna bahwa alam dapat menjadi sumber belajar dan pedoman hidup manusia.",soal:"Apa yang dimaksud dengan kearifan lokal? Berikan 2 contoh kearifan lokal dari daerah yang kamu ketahui dan jelaskan nilai yang terkandung di dalamnya!"},
  {stimulus:"🤝 Gambar: Ilustrasi dua situasi: kiri menunjukkan gotong royong membangun jembatan, kanan menunjukkan seseorang bekerja sendiri dan kelelahan.",soal:"Bandingkan manfaat bekerja secara gotong royong dengan bekerja secara individual! Mengapa gotong royong lebih menguntungkan bagi masyarakat?"},
  {stimulus:"📖 Teks: 'Bersatu kita teguh, bercerai kita runtuh' adalah semboyan yang mencerminkan pentingnya persatuan bagi bangsa Indonesia.",soal:"Bagaimana cara kamu sebagai pelajar kelas 7 dapat berkontribusi dalam menjaga persatuan dan kesatuan di lingkungan sekolah? Sebutkan minimal 4 cara nyata!"},
  {stimulus:"🌱 Gambar: Foto lingkungan desa yang bersih, hijau, dan terawat berkat kerja sama warganya, dibandingkan lingkungan perkotaan yang kotor dan tidak terawat.",soal:"Jelaskan hubungan antara gotong royong dengan kelestarian lingkungan hidup! Bagaimana semangat gotong royong dapat membantu menjaga lingkungan agar tetap sehat dan bersih?"}
];

let nama="",kelas="",currentSection=0,currentQ=0;
let jawaban={pg:{},pgk:{},ur:{}};
let showResult=false;

function renderCover(){
  document.getElementById("view-cover").innerHTML=`
  <div class="cover">
    <div class="cover-badge">Ujian CBT</div>
    <h1>Pendidikan Pancasila</h1>
    <h2>Kelas 7 — Keberagaman Budaya &amp; Gotong Royong</h2>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;margin-bottom:1.5rem;text-align:left">
      <p style="font-size:13px;color:var(--color-text-secondary);line-height:1.7"><strong style="color:var(--color-text-primary)">Petunjuk:</strong><br>
      • 30 soal Pilihan Ganda (PG)<br>
      • 10 soal PG Kompleks (pilih jawaban benar lebih dari satu)<br>
      • 5 soal Uraian (jawab dengan kalimat lengkap)<br>
      • Setiap soal dilengkapi stimulus gambar atau teks<br>
      • Kerjakan dengan jujur dan teliti</p>
    </div>
    <div class="form-group">
      <label>Nama Lengkap</label>
      <input type="text" id="inp-nama" placeholder="Masukkan nama lengkap kamu" />
    </div>
    <div class="form-group">
      <label>Kelas</label>
      <select id="inp-kelas">
        <option value="">-- Pilih Kelas --</option>
        <option>7A</option><option>7B</option><option>7C</option><option>7D</option>
        <option>7E</option><option>7F</option><option>7G</option><option>7H</option><option>7I</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Mulai Ujian →</button>
  </div>`;
}

function startQuiz(){
  nama=document.getElementById("inp-nama").value.trim();
  kelas=document.getElementById("inp-kelas").value;
  if(!nama||!kelas){alert("Mohon isi nama dan kelas terlebih dahulu!");return;}
  currentSection=0;currentQ=0;
  renderQuiz();
}

function getSection(){return currentSection===0?"PG":currentSection===1?"PGK":"UR";}
function getSoal(){
  if(currentSection===0)return SOAL_PG[currentQ];
  if(currentSection===1)return SOAL_PGK[currentQ];
  return SOAL_URAIAN[currentQ];
}
function totalQ(){return currentSection===0?30:currentSection===1?10:5;}
function globalNum(){return currentSection===0?currentQ+1:currentSection===1?30+currentQ+1:40+currentQ+1;}

function renderQuiz(){
  const sec=getSection();
  const soal=getSoal();
  const total=45;
  const gNum=globalNum();
  const pct=Math.round((gNum-1)/total*100);

  let stimHTML=`<div class="stimulus">${soal.stimulus}</div>`;
  let ansHTML="";

  if(sec==="PG"){
    const sel=jawaban.pg[currentQ]||"";
    ansHTML=`<div class="options">`+soal.opsi.map((o,i)=>{
      const v=o[0];
      const cls=sel===v?"selected":"";
      return `<label class="${cls}"><input type="radio" name="pgans" value="${v}" onchange="savePG('${v}')" ${sel===v?"checked":""}> ${o}</label>`;
    }).join("")+`</div>`;
  } else if(sec==="PGK"){
    const sel=jawaban.pgk[currentQ]||[];
    ansHTML=`<div class="options">`+soal.opsi.map((o,i)=>{
      const v=o[0];
      const checked=sel.includes(v);
      return `<label class="${checked?"selected":""}"><input type="checkbox" value="${v}" onchange="savePGK(this)" ${checked?"checked":""}> ${o}</label>`;
    }).join("")+`</div>`;
  } else {
    const val=jawaban.ur[currentQ]||"";
    ansHTML=`<textarea class="uraian-area" placeholder="Tulis jawaban kamu di sini..." oninput="saveUR(this.value)">${val}</textarea>`;
  }

  const secLabel=sec==="PG"?`<span class="section-label lbl-pg">Pilihan Ganda</span>`:sec==="PGK"?`<span class="section-label lbl-pgk">PG Kompleks</span>`:`<span class="section-label lbl-ur">Uraian</span>`;

  document.getElementById("view-cover").innerHTML=`
  <div class="quiz-header">
    <div style="display:flex;align-items:center;gap:.75rem">
      ${secLabel}
      <span style="font-size:13px;color:var(--color-text-secondary)">No. ${gNum} / 45</span>
    </div>
    <div style="font-size:13px;color:var(--color-text-secondary)">👤 ${nama} — ${kelas}</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="q-card">
    <div class="q-num">Soal ${gNum} dari 45 ${sec==="PGK"?"— Pilih semua jawaban yang benar":""}</div>
    ${stimHTML}
    <div class="q-text">${soal.soal}</div>
    ${ansHTML}
  </div>
  <div class="nav-btns">
    ${gNum>1?`<button class="btn" onclick="prevQ()">← Sebelumnya</button>`:""}
    ${gNum<45?`<button class="btn btn-primary" onclick="nextQ()">Selanjutnya →</button>`:`<button class="btn btn-primary" onclick="submitQuiz()">Selesai & Lihat Nilai ✓</button>`}
  </div>`;
}

function savePG(v){jawaban.pg[currentQ]=v;renderQuiz();}
function savePGK(el){
  if(!jawaban.pgk[currentQ])jawaban.pgk[currentQ]=[];
  const arr=jawaban.pgk[currentQ];
  if(el.checked){if(!arr.includes(el.value))arr.push(el.value);}
  else{const i=arr.indexOf(el.value);if(i>-1)arr.splice(i,1);}
  renderQuiz();
}
function saveUR(v){jawaban.ur[currentQ]=v;}

function nextQ(){
  if(document.querySelector(".uraian-area"))jawaban.ur[currentQ]=document.querySelector(".uraian-area").value;
  if(currentQ<totalQ()-1){currentQ++;renderQuiz();return;}
  if(currentSection<2){currentSection++;currentQ=0;renderQuiz();}
}
function prevQ(){
  if(document.querySelector(".uraian-area"))jawaban.ur[currentQ]=document.querySelector(".uraian-area").value;
  if(currentQ>0){currentQ--;renderQuiz();return;}
  if(currentSection>0){currentSection--;currentQ=totalQ()-1;renderQuiz();}
}

function submitQuiz(){
  if(document.querySelector(".uraian-area"))jawaban.ur[currentQ]=document.querySelector(".uraian-area").value;
  if(!confirm("Apakah kamu yakin ingin mengumpulkan jawaban?"))return;
  showResults();
}

function showResults(){
  let pgBenar=0,pgkBenar=0,urSkor=0;
  SOAL_PG.forEach((s,i)=>{if(jawaban.pg[i]===s.jwb)pgBenar++;});
  SOAL_PGK.forEach((s,i)=>{
    const userAns=(jawaban.pgk[i]||[]).sort().join("");
    const correct=s.jwb.sort().join("");
    if(userAns===correct)pgkBenar++;
  });
  let urDiisi=0;
  SOAL_URAIAN.forEach((s,i)=>{const v=(jawaban.ur[i]||"").trim();if(v.length>30)urDiisi++;});
  urSkor=urDiisi*4;

  const pgSkor=pgBenar*2;
  const pgkSkor=pgkBenar*2;
  const total=pgSkor+pgkSkor+urSkor;
  const max=100;
  const nilai=Math.min(100,total);

  let grade,warna,umpan;
  if(nilai>=90){grade="A";warna="#0F6E56";umpan="Luar Biasa! Kamu menguasai materi dengan sangat baik. Terus pertahankan semangat belajarmu dan jadilah teladan bagi teman-teman!";}
  else if(nilai>=80){grade="B";warna="#185FA5";umpan="Bagus sekali! Pemahamanmu sudah baik. Tingkatkan lagi dengan membaca materi tentang kearifan lokal dan gotong royong lebih mendalam.";}
  else if(nilai>=70){grade="C";warna="#BA7517";umpan="Cukup baik! Kamu sudah memahami konsep dasarnya. Pelajari kembali materi pelestarian budaya dan penerapan gotong royong dalam kehidupan sehari-hari.";}
  else if(nilai>=60){grade="D";warna="#993C1D";umpan="Perlu lebih banyak belajar. Fokuskan belajarmu pada materi keberagaman budaya Indonesia, kearifan lokal, dan nilai-nilai Pancasila dalam kehidupan bermasyarakat.";}
  else{grade="E";warna="#A32D2D";umpan="Jangan menyerah! Baca kembali seluruh materi tentang keanekaragaman budaya, pelestarian lingkungan, gotong royong, dan persatuan bangsa. Minta bantuan gurumu.";}

  document.getElementById("view-cover").innerHTML=`
  <div class="result-card">
    <div class="score-circle" style="border-color:${warna};background:${warna}15">
      <span class="score-num" style="color:${warna}">${nilai}</span>
      <span class="score-label" style="color:${warna}">Grade ${grade}</span>
    </div>
    <h2 style="font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:.25rem">${nama}</h2>
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem">Kelas ${kelas} · CBT Pendidikan Pancasila</p>
    <div class="feedback-box">
      <p style="font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:.5rem">💬 Umpan Balik</p>
      <p style="font-size:14px;color:var(--color-text-secondary);line-height:1.6">${umpan}</p>
    </div>
    <table class="detail-table">
      <thead><tr><th>Bagian</th><th>Benar</th><th>Skor</th></tr></thead>
      <tbody>
        <tr><td>Pilihan Ganda (30 soal × 2)</td><td>${pgBenar}/30</td><td>${pgSkor}</td></tr>
        <tr><td>PG Kompleks (10 soal × 2)</td><td>${pgkBenar}/10</td><td>${pgkSkor}</td></tr>
        <tr><td>Uraian (5 soal × 4)*</td><td>${urDiisi}/5</td><td>${urSkor}</td></tr>
        <tr style="font-weight:500"><td>Total Nilai</td><td colspan="2" style="color:${warna}">${nilai} / 100</td></tr>
      </tbody>
    </table>
    <p style="font-size:11px;color:var(--color-text-tertiary);margin-top:.5rem">*Skor uraian dihitung berdasarkan kelengkapan jawaban</p>
    <div style="margin-top:1.5rem">
      <button class="btn btn-primary" onclick="location.reload()">Ulangi Ujian</button>
    </div>
  </div>`;
}

renderCover();
</script>
